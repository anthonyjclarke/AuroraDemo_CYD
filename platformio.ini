; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ─── Shared settings ─────────────────────────────────────────────────────────
[common]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed  = 230400
lib_deps =
	bodmer/TFT_eSPI@^2.5.43
	fastled/FastLED@^3.4.0
build_flags_shared =
	; lib/debug.h include path (not in a library sub-directory)
	-I lib
	; Debug level: 0=Off 1=Error 2=Warn 3=Info(default) 4=Verbose
	-DDEBUG_LEVEL=3
	; TFT_eSPI inline driver config (no User_Setup.h needed)
	-DUSER_SETUP_LOADED=1
	-DTFT_MISO=12
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DTFT_DC=2
	-DTFT_RST=-1
	-DTFT_BL=21
	-DTFT_BACKLIGHT_ON=HIGH
	; CYD XPT2046 resistive touch — shares SPI bus, own CS on GPIO 33
	-DTOUCH_CS=33
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000

; ─── CYD 2.8" — ILI9341 320×240 ─────────────────────────────────────────────
[env:esp32-cyd-28]
platform      = ${common.platform}
board         = ${common.board}
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed  = ${common.upload_speed}
upload_port   = /dev/cu.usbserial-230
lib_deps      = ${common.lib_deps}
build_flags =
	${common.build_flags_shared}
	-DBOARD_CYD_28=1
	; Aurora virtual canvas: 160×120 pixels scaled 2× → 320×240 on the TFT
	-DMATRIX_WIDTH=160
	-DMATRIX_HEIGHT=120
	; ILI9341 driver — TFT_WIDTH/HEIGHT inferred from driver header
	-DILI9341_DRIVER=1

; ─── CYD 3.5" — ST7796 480×320 ──────────────────────────────────────────────
[env:esp32-cyd-35]
platform      = ${common.platform}
board         = ${common.board}
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed  = ${common.upload_speed}
upload_port   = /dev/cu.usbserial-230
lib_deps      = ${common.lib_deps}
build_flags =
	${common.build_flags_shared}
	-DBOARD_CYD_35=1
	; Aurora virtual canvas: 240×160 pixels scaled 2× → 480×320 on the TFT
	-DMATRIX_WIDTH=240
	-DMATRIX_HEIGHT=160
	; ST7796 driver — explicit native portrait dims required (setRotation(1) converts to landscape)
	-DST7796_DRIVER=1
	-DTFT_WIDTH=320
	-DTFT_HEIGHT=480
