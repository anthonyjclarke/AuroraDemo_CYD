; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ─── Shared settings ─────────────────────────────────────────────────────────
[common]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed  = 230400
lib_deps =
	bodmer/TFT_eSPI@^2.5.43
	fastled/FastLED@^3.4.0
; Flags common to both boards — SPI speed, backlight pin, and driver are
; board-specific and set per-env below.
build_flags_shared =
	-I lib
	-DDEBUG_LEVEL=3
	-DUSER_SETUP_LOADED=1
	-DTFT_MISO=12
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DTFT_DC=2
	-DTFT_RST=-1
	-DTFT_BACKLIGHT_ON=HIGH
	-DTOUCH_CS=33
	-DSPI_TOUCH_FREQUENCY=2500000

; ─── CYD 2.8" — ILI9341 320×240 ─────────────────────────────────────────────
[env:esp32-cyd-28]
platform      = ${common.platform}
board         = ${common.board}
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed  = ${common.upload_speed}
upload_port   = /dev/cu.usbserial-230
lib_deps      = ${common.lib_deps}
build_flags =
	${common.build_flags_shared}
	-DBOARD_CYD_28=1
	; Aurora virtual canvas: 160×120 pixels scaled 2× → 320×240 on the TFT
	-DMATRIX_WIDTH=160
	-DMATRIX_HEIGHT=120
	-DDISPLAY_SCALE=2
	; ILI9341 driver — TFT_WIDTH/HEIGHT inferred from driver header
	-DILI9341_DRIVER=1
	-DTFT_BL=21
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000

; ─── CYD 4.0" — ST7796S 480×320 (ESP32-32E) ─────────────────────────────────
; No PSRAM on this board. Canvas 120×80 at 4× scale fills 480×320 exactly and
; uses only ~48 KB of heap buffers, well within the 327 KB available SRAM.
[env:esp32-cyd-40]
platform      = ${common.platform}
board         = ${common.board}
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed  = ${common.upload_speed}
upload_port   = /dev/cu.usbserial-230
lib_deps      = ${common.lib_deps}
build_flags =
	${common.build_flags_shared}
	-DBOARD_CYD_40=1
	; Aurora virtual canvas: 120×80 pixels scaled 4× → 480×320 on the TFT
	-DMATRIX_WIDTH=120
	-DMATRIX_HEIGHT=80
	-DDISPLAY_SCALE=4
	; ST7796S driver — 4" CYD (ESP32-32E)
	-DST7796_DRIVER=1
	-DTFT_WIDTH=320
	-DTFT_HEIGHT=480
	; BGR colour order (verified from working reference config)
	-DTFT_RGB_ORDER=TFT_BGR
	; Backlight on GPIO 27 on the 4" board (differs from 2.8" GPIO 21)
	-DTFT_BL=27
	; SPI frequency per working reference config
	-DSPI_FREQUENCY=27000000
	-DSPI_READ_FREQUENCY=20000000
