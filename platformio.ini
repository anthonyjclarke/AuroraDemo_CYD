; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 230400
upload_port = /dev/cu.usbserial-330
lib_deps =
	bodmer/TFT_eSPI@^2.5.43
	fastled/FastLED@^3.4.0
build_flags =
	; lib/debug.h include path (not in a library sub-directory)
	-I lib
	; Debug level: 0=Off 1=Error 2=Warn 3=Info(default) 4=Verbose
	-DDEBUG_LEVEL=3
	; Aurora virtual canvas: 160×120 pixels scaled 2× → 320×240 on the CYD
	-DMATRIX_WIDTH=160
	-DMATRIX_HEIGHT=120
	; TFT_eSPI inline driver config (no User_Setup.h needed)
	-DUSER_SETUP_LOADED=1
	-DILI9341_DRIVER=1
	-DTFT_MISO=12
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DTFT_DC=2
	-DTFT_RST=-1
	-DTFT_BL=21
	-DTFT_BACKLIGHT_ON=HIGH
	; CYD XPT2046 resistive touch — shares SPI bus, own CS on GPIO 33
	-DTOUCH_CS=33
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
